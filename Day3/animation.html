<!DOCTYPE html>
<html lang="en">
<head>
   <style>
    .box{
      height: 200px;
      width: 200px;
      background-color: red;
      /* transition: 1s ease-in-out 0.5s; */
      animation: change 5s ease-in-out  infinite alternate;
    }
    /* .box:hover{
      transform: scale(0.5) translateX(100%)  rotate(120deg);  
    }  */

      @keyframes change {
        0%{
          transform: scale(1) rotate(0deg) translate(-10%);
          border-radius: 0px;
        }
        25%{
          transform: scale(0.8) rotate(40deg) translate(-30%);
          border-radius: 5px;
        }
        50%{
          transform: scale(0.5) rotate(80deg) translate(-50%);
          border-radius: 10px;
        }
        75%{
          transform: scale(0.4) rotate(100deg) translate(-70%);
          border-radius: 30px;
        }
        100%{
          transform: scale(0.1) rotate(180deg) translate(-100%);
          border-radius: 50%;
          
        }
        
      }

    .mainparent{
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
   </style>
</head>
<body>
    <div  class="mainparent">

        <div class="box" style="text-align: center;">
          <h1>hello world</h1>
      </div>

    </div>
</body>
</html>
